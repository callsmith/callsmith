name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    # Ubuntu is sufficient for build validation and unit tests.
    # Avalonia's rendering paths are platform-specific, but unit tests run
    # headlessly with no rendering. UI/ViewModel tests will use
    # Avalonia.Headless.XUnit, which also runs correctly on Linux.
    # A multi-platform matrix can be added when platform-specific bugs appear.
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal
