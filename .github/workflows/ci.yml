name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.os }})
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        # /maxcpucount:1 forces sequential project builds, preventing Avalonia's
        # XAML compiler from being invoked concurrently on the same PDB file.
        run: dotnet build --no-restore --configuration Release /maxcpucount:1

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal
