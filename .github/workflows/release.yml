name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.rid }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - rid: win-x64
            archive: zip
          - rid: linux-x64
            archive: tar.gz
          - rid: osx-x64
            archive: tar.gz
          - rid: osx-arm64
            archive: tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          dotnet publish src/Callsmith.Desktop/Callsmith.Desktop.csproj \
            --configuration Release \
            --runtime ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:Version="$VERSION" \
            -p:InformationalVersion="${GITHUB_REF_NAME}" \
            --output publish/${{ matrix.rid }}

      - name: Archive (zip)
        if: matrix.archive == 'zip'
        run: |
          cd publish/${{ matrix.rid }}
          zip -r ../../callsmith-${{ github.ref_name }}-${{ matrix.rid }}.zip .

      - name: Archive (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: |
          tar -czf callsmith-${{ github.ref_name }}-${{ matrix.rid }}.tar.gz \
            -C publish/${{ matrix.rid }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: callsmith-${{ matrix.rid }}
          path: callsmith-${{ github.ref_name }}-${{ matrix.rid }}.*

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
