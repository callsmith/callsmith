name: Nightly CI

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: read
  actions: write

concurrency:
  group: nightly-ci
  cancel-in-progress: true

jobs:
  check-branch-activity:
    name: Check default branch activity
    runs-on: ubuntu-latest
    outputs:
      run_nightly: ${{ steps.check.outputs.run_nightly }}
      branch_name: ${{ steps.check.outputs.branch_name }}
    steps:
      - name: Check for changes in the last 24 hours
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const branchName = context.payload.repository?.default_branch ?? 'main';
            const { owner, repo } = context.repo;
            const commitsResponse = await github.rest.repos.listCommits({
              owner,
              repo,
              sha: branchName,
              per_page: 1
            });

            const latestCommit = commitsResponse.data[0];
            if (!latestCommit) {
              core.info(`No commits found on '${branchName}'. Skipping nightly build.`);
              core.setOutput('run_nightly', 'false');
              core.setOutput('branch_name', branchName);
              return;
            }

            const commitDateRaw = latestCommit.commit.committer?.date ?? latestCommit.commit.author?.date;
            const commitDate = commitDateRaw ? new Date(commitDateRaw) : null;
            const cutoffTime = Date.now() - (24 * 60 * 60 * 1000);
            const shouldRun = commitDate !== null && Number.isFinite(commitDate.getTime()) && commitDate.getTime() >= cutoffTime;

            core.info(`Default branch: ${branchName}`);
            core.info(`Latest commit: ${commitDateRaw ?? 'unknown'}`);
            core.info(`Nightly build will run: ${shouldRun}`);

            core.setOutput('run_nightly', shouldRun ? 'true' : 'false');
            core.setOutput('branch_name', branchName);

  build-and-test:
    name: Build & Test (${{ matrix.os }})
    needs: check-branch-activity
    if: needs.check-branch-activity.outputs.run_nightly == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.check-branch-activity.outputs.branch_name }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        # --maxcpucount:1 forces sequential project builds, preventing Avalonia's
        # XAML compiler from being invoked concurrently on the same PDB file.
        run: dotnet build --no-restore --configuration Release --maxcpucount:1

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal

  cleanup-old-nightly-runs:
    name: Cleanup old nightly runs
    needs: check-branch-activity
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - name: Delete old nightly workflow runs
        uses: actions/github-script@v7
        with:
          script: |
            const retentionDays = 14;
            const cutoffTime = Date.now() - (retentionDays * 24 * 60 * 60 * 1000);
            const { owner, repo } = context.repo;
            const currentRunId = context.runId;

            const currentRun = await github.rest.actions.getWorkflowRun({
              owner,
              repo,
              run_id: currentRunId
            });

            const workflowId = currentRun.data.workflow_id;
            let page = 1;
            let deleted = 0;

            while (true) {
              const runsResponse = await github.rest.actions.listWorkflowRuns({
                owner,
                repo,
                workflow_id: workflowId,
                per_page: 100,
                page
              });

              const runs = runsResponse.data.workflow_runs;
              if (runs.length === 0) {
                break;
              }

              for (const run of runs) {
                if (run.id === currentRunId) {
                  continue;
                }

                const createdAt = new Date(run.created_at).getTime();
                if (Number.isFinite(createdAt) && createdAt < cutoffTime) {
                  await github.rest.actions.deleteWorkflowRun({
                    owner,
                    repo,
                    run_id: run.id
                  });
                  deleted += 1;
                }
              }

              if (runs.length < 100) {
                break;
              }

              page += 1;
            }

            core.info(`Deleted ${deleted} nightly workflow run(s) older than ${retentionDays} day(s).`);
